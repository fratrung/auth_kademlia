# DEMO_DID_UUID is read from the .env file in the same directory.
# peer1 publishes under that key; peer2 retrieves it.
# To change the demo DID, edit .env and restart with `docker compose up --build`.

services:
  seed:
    build: .
    container_name: dht_seed
    environment:
      - NODE_PORT=5678
      - IS_SEED=true
      - RUST_LOG=info
    networks:
      dht_net:
        ipv4_address: 172.20.0.10
    ports:
      - "5678:5678/udp"

  peer1:
    build: .
    container_name: dht_peer_1
    environment:
      - NODE_PORT=5679
      - BOOTSTRAP_ADDR=172.20.0.10:5678
      - ROLE=publisher
      - FIXED_DID_UUID=${DEMO_DID_UUID}
      - RUST_LOG=info
    networks:
      dht_net:
        ipv4_address: 172.20.0.11
    depends_on:
      - seed

  peer2:
    build: .
    container_name: dht_peer_2
    environment:
      - NODE_PORT=5680
      - BOOTSTRAP_ADDR=172.20.0.10:5678
      - ROLE=retriever
      - RETRIEVE_KEY=${DEMO_DID_UUID}
      - RUST_LOG=info
    networks:
      dht_net:
        ipv4_address: 172.20.0.12
    depends_on:
      - seed

  peer3:
    build: .
    container_name: dht_peer_3
    environment:
      - NODE_PORT=5681
      - BOOTSTRAP_ADDR=172.20.0.10:5678
      - ROLE=publisher
      - RUST_LOG=info
    networks:
      dht_net:
        ipv4_address: 172.20.0.13
    depends_on:
      - seed

networks:
  dht_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
